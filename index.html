<!doctype html>
<html lang="zh">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&display=swap" rel="stylesheet">
    <title>USACO Silver 试题完成情况</title>
    <style>
        :root {
            --green: rgb(82, 196, 26);
            --red: rgb(231, 76, 60);
            --border: #ccc;
            --cell-width: 100px;
            /* equal column width (narrower) */
            --username-width: 200px;
            /* wider username */
        }

        body {
            font-family: "Noto Sans", system-ui, "Segoe UI", Arial, sans-serif;
            padding: 18px;
            background: #fff;
        }

        /* wrapper provides scrollbars when table is wider than container */
        #table-wrap {
            overflow: auto;
            max-height: calc(100vh - 160px); /* ensure vertical scrolling inside wrapper so sticky header works */
        }

        table {
            border-collapse: collapse;
            width: max-content;
            table-layout: fixed;
        }

        th,
        td {
            border: 1px solid var(--border);
            padding: 8px 12px;
            vertical-align: middle;
            width: var(--cell-width);
            box-sizing: border-box;
            background: #fff;
        }

        th.username,
        td.username {
            width: var(--username-width);
        }

        thead th {
            font-weight: 700;
            position: sticky;
            top: 0;
            background: #fff;
            z-index: 11;
            border-bottom: 1px solid var(--border); /* explicit bottom border to avoid gaps */
            background-clip: padding-box;
            transform: translateZ(0); /* avoid sub-pixel antialias transparency */
            will-change: transform;
        }

        /* frozen columns (first and second) */
        .frozen-col {
            position: sticky;
            z-index: 6;
            background: #fff;
            border-right: 1px solid var(--border); /* explicit right border */
            background-clip: padding-box;
            transform: translateZ(0);
            will-change: transform;
        }

        .frozen-col-0 {
            left: 0;
        }

        .frozen-col-1 {
            left: calc(var(--cell-width));
        }

        /* ensure header cells in frozen columns sit above other frozen cells */
        thead th.frozen-col {
            z-index: 12;
            border-right: 1px solid var(--border);
        }

        /* body frozen cells sit under headers but above normal cells */
        tbody td.frozen-col { z-index: 8; }

        /* fallback: use outline on sticky elements when browser has subpixel issues */
        thead th, .frozen-col { outline: 0 solid transparent; }

        td:not(.username),
        th:not(.username) {
            text-align: center;
        }

        td.username {
            text-align: left;
        }

        th[data-has-name] {
            cursor: help
        }

        .mark {
            display: inline-block;
            font-size: 1.1em;
        }

        .icon {
            width: 18px;
            height: 18px;
            display: block;
            margin: 0 auto;
        }

        .ok {
            color: var(--green);
        }

        .no {
            color: var(--red);
        }

        @media (max-width:640px) {

            th,
            td {
                padding: 6px 8px;
                font-size: 14px;
            }
        }
    </style>
</head>

<body>
    <h2>USACO Silver 试题 AC 情况</h2>
    <div id="table-wrap" aria-live="polite"></div>

    <script>
        async function loadTSV(path = 'data.tsv') {
            try {
                const res = await fetch(path);
                if (!res.ok) throw new Error('fetch failed');
                const text = await res.text();
                renderTSV(text);
            } catch (e) {
                // fallback: try to load embedded TSV if fetch is blocked (file:// issues)
                const embedded = document.getElementById('tsv-embedded');
                if (embedded) renderTSV(embedded.textContent);
                else document.getElementById('table-wrap').textContent = '无法加载 data.tsv';
            }
        }
        function renderTSV(text) {
            const rows = text.replace(/\r/g, '').split(/\n/).filter(r => r.trim() !== "");
            if (rows.length === 0) { document.getElementById('table-wrap').textContent = '空的 TSV'; return; }
            const idRow = rows[0].split('\t');
            const nameRow = rows[1] ? rows[1].split('\t') : [];

            const table = document.createElement('table');
            const thead = document.createElement('thead');
            const tbody = document.createElement('tbody');

            // First visible header row: show IDs. Tooltips (title) come from second row (nameRow) for cols >=3
            const trh = document.createElement('tr');
            idRow.forEach((h, i) => {
                const th = document.createElement('th');
                th.textContent = h;
                if (i === 0) {
                    th.classList.add('frozen-col', 'frozen-col-0');
                }
                if (i === 1) {
                    th.classList.add('username', 'frozen-col', 'frozen-col-1');
                }
                if (i >= 3 && nameRow[i] && nameRow[i].trim() !== '') {
                    th.title = nameRow[i];
                    th.setAttribute('data-has-name', '1');
                }
                trh.appendChild(th);
            });
            thead.appendChild(trh);

            // Data rows start from row index 2 (skip the nameRow)
            for (let i = 2; i < rows.length; i++) {
                const cells = rows[i].split('\t');
                const tr = document.createElement('tr');
                cells.forEach((c, j) => {
                    const td = document.createElement('td');
                    if (j === 0) td.classList.add('frozen-col', 'frozen-col-0');
                    if (j === 1) td.classList.add('username', 'frozen-col', 'frozen-col-1');
                    if (j >= 3) {
                        const v = c.trim();
                        if (v === '1') {
                            td.innerHTML = '<span class="mark ok"><svg viewBox="0 0 512 512" class="icon" aria-hidden="true"><path class="" fill="currentColor" d="M434.8 70.1c14.3 10.4 17.5 30.4 7.1 44.7l-256 352c-5.5 7.6-14 12.3-23.4 13.1s-18.5-2.7-25.1-9.3l-128-128c-12.5-12.5-12.5-32.8 0-45.3s32.8-12.5 45.3 0l101.5 101.5 234-321.7c10.4-14.3 30.4-17.5 44.7-7.1z"></path></svg></span>';
                        } else {
                            td.innerHTML = '<span class="mark no"><svg viewBox="0 0 512 512" class="icon" aria-hidden="true"><path fill="currentColor" d="M96 224h320v64H96z"></path></svg></span>';
                        }
                    } else {
                        td.textContent = c;
                    }
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            }

            table.appendChild(thead);
            table.appendChild(tbody);
            const wrap = document.getElementById('table-wrap');
            wrap.innerHTML = ''; wrap.appendChild(table);
        }
        // attempt load; uses data.tsv in same folder. If file:// prevents fetch, the embedded fallback below will be used.
        loadTSV();
    </script>

</body>
