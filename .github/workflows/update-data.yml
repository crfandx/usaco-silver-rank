name: Update USACO Data

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Run crawler
        env:
          SID: ${{ secrets.SID }}
          SID_SIG: ${{ secrets.SID_SIG }}
        run: uv run python crawler.py

      - name: Prepare deploy directory
        run: |
          mkdir -p deploy
          cp index.html data.tsv deploy/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy deploy --project-name=usaco-silver-rank
