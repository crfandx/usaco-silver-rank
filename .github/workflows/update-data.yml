name: Update USACO Data

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Run crawler
        env:
          SID: ${{ secrets.SID }}
          SID_SIG: ${{ secrets.SID_SIG }}
        run: uv run python crawler.py

      - name: Commit and push to repository
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data.tsv
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "dist: Update data.tsv [skip ci]"
            git push
          fi

      - name: Prepare deploy directory
        run: |
          mkdir -p deploy
          cp index.html data.tsv deploy/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy deploy --project-name=usaco-silver-rank
